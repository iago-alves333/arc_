# =====================================================
# Quebra de Maldição — Configuração do Servidor
# =====================================================

server.port=8080

# Número TOTAL de lotes (chunks) na fila global
# Com 5000 chunks, 40 alunos (1 lote a cada ~1.5s) levam cerca de 2 minutos para achar a senha
game.num-chunks=5000
# Timeout em segundos para lotes em processamento (tolerância a falhas)
game.chunk-timeout-seconds=240

# CORS — permite qualquer origem (necessário para ngrok que gera subdomínios dinâmicos)
spring.web.cors.allowed-origins=*
