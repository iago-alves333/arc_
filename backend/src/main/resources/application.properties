# =====================================================
# Quebra de Maldição — Configuração do Servidor
# =====================================================

server.port=8080

# Número de lotes (chunks) por aluno
# Mais chunks = demo mais longa (~500ms por chunk)
# 94 chunks ≈ 47 segundos | 150 chunks ≈ 75 segundos
game.num-chunks=94

# Timeout em segundos para lotes em processamento (tolerância a falhas)
game.chunk-timeout-seconds=15

# CORS — permite o frontend React (Vite dev server)
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000
